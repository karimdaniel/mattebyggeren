    function openCanvasInput(canvasX, canvasY, defaultType) {
      hideQuickMenu();
      const display = document.getElementById('step-display');
      display.querySelectorAll('.canvas-input').forEach(el => el.remove());

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'canvas-input';
      input.style.left = canvasX + 'px';
      input.style.top  = canvasY + 'px';
      input.placeholder = defaultType === 'number' ? 'Tall...' : 'Tekst...';

      let suppressBlur = false;

      // Felles lagre-funksjon brukt av både Enter og blur
      function commitInput(keepOpen) {
        const val = input.value.trim();
        if (!val) { if (!keepOpen) input.remove(); return; }

        const fracM = val.match(/^(-?\d+(?:[.,]\d*)?)\s*\/\s*(-?\d+(?:[.,]\d*)?)$/);
        if (fracM) {
          saveUndo();
          const token = makeToken('fraction', null, {
            x: canvasX, y: canvasY,
            numerator:   [{ value: fracM[1], color: null }],
            denominator: [{ value: fracM[2], color: null }]
          });
          step().tokens.push(token);
          state.selectedTokenIds.clear();
          render();
        } else {
          const ops = { '+': '+', '-': '−', '*': '×', 'x': '×', '/': '÷', '=': '=', '%': '%' };
          if (ops[val]) addItem('operator', ops[val], { x: canvasX, y: canvasY, color: null });
          else if (/^[\d.,\s]+$/.test(val)) addItem('number', val, { x: canvasX, y: canvasY, color: null });
          else addItem('text', val, { x: canvasX, y: canvasY, color: null });
        }

        if (keepOpen) {
          input.value = '';
          input.style.left = state.nextPlaceX + 'px';
          input.style.top  = state.nextPlaceY + 'px';
          suppressBlur = true;
          setTimeout(() => { suppressBlur = false; input.focus(); }, 40);
        } else {
          input.remove();
        }
      }

      input.addEventListener('keydown', (ev) => {
        ev.stopPropagation();
        if (ev.key === 'Escape') { input.remove(); return; }
        if (ev.key === 'Enter')  { commitInput(true); return; }
      });

      // Auto-lagre ved blur (klikk bort) — uten å kreve Enter
      input.addEventListener('blur', () => {
        setTimeout(() => { if (!suppressBlur) commitInput(false); }, 100);
      });

      display.appendChild(input);
      setTimeout(() => input.focus(), 30);
    }

    // ============================================================
    // KLIPP / KOPIER / LIM
    // ============================================================
    function copyItem() {
      const tokens = [...state.selectedTokenIds]
        .map(id => step().tokens.find(t => t.id === id))
        .filter(Boolean);
      if (tokens.length) clipboard = tokens.map(t => JSON.parse(JSON.stringify(t)));
    }

    function cutItem() {
      copyItem();
      saveUndo();
      [...state.selectedTokenIds].forEach(id => {
        step().tokens = step().tokens.filter(t => t.id !== id);
      });
      state.selectedTokenIds.clear();
      render();
    }

    function pasteItem() {
      if (!clipboard || !clipboard.length) return;
      saveUndo();
      const newTokens = clipboard.map(t => {
        const nt = JSON.parse(JSON.stringify(t));
        nt.id  = uid();
        nt.x   = (t.x || 60) + 30;
        nt.y   = (t.y || 60) + 30;
        return nt;
      });
      newTokens.forEach(t => step().tokens.push(t));
      state.selectedTokenIds = new Set(newTokens.map(t => t.id));
      render();
    }

    // ============================================================
    // INLINE REDIGERING
    // ============================================================
    function startInlineEdit(token, wrapEl) {
      // Fjern ev. eksisterende redigeringsfelter
      document.querySelectorAll('.inline-edit').forEach(el => el.remove());

      const display = document.getElementById('step-display');
      const wrapRect = wrapEl.getBoundingClientRect();
      const dispRect = display.getBoundingClientRect();

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'canvas-input inline-edit';
      input.value = token.value;

      // Plasser over elementet (i display-koordinater)
      input.style.left   = (wrapRect.left - dispRect.left) + 'px';
      input.style.top    = (wrapRect.top  - dispRect.top)  + 'px';
      input.style.minWidth = Math.max(80, wrapRect.width) + 'px';

      // Farge
      if (token.color) {
        const COLORS_MAP = { red:'#ef4444', blue:'#3b82f6', green:'#22c55e', orange:'#f97316', purple:'#a855f7', pink:'#ec4899', brown:'#92400e' };
        input.style.color = COLORS_MAP[token.color] || '';
      }

      function commitEdit() {
        const val = input.value.trim();
        if (val !== '' && val !== token.value) {
          saveUndo();
          token.value = val;
          render();
        }
        input.remove();
      }

      input.addEventListener('keydown', (ev) => {
        ev.stopPropagation();
        if (ev.key === 'Enter')  { commitEdit(); return; }
        if (ev.key === 'Escape') { input.remove(); return; }
      });
      // Auto-lagre ved blur (klikk bort)
      input.addEventListener('blur', () => setTimeout(commitEdit, 100));

      display.appendChild(input);
      input.focus();
      input.select();
    }

    // Rediger brøk via popover (dobbeltklikk eller kontekstmeny)
    function openFractionModalEdit(token) { openFracPopoverEdit(token); }

    // ============================================================
    // KONTEKSTMENY
    // ============================================================
    function showContextMenu(clientX, clientY, token) {
      const menu = document.getElementById('context-menu');
      menu.innerHTML = '';

      const editable = ['number','text','currency','operator'].includes(token.type);
      const items = [
        editable ? { icon: '✏️', label: 'Rediger',  action: () => {
          const el = document.querySelector(`[data-token-id="${token.id}"]`);
          if (el) startInlineEdit(token, el);
        }} : null,
        token.type === 'fraction' ? { icon: '✏️', label: 'Rediger brøk', action: () => openFractionModalEdit(token) } : null,
        { icon: '📋', label: 'Kopier',   action: () => { copyItem(); flashEl(token.id); }},
        { icon: '✂️', label: 'Klipp ut', action: () => cutItem() },
        { sep: true },
        { icon: '🗑', label: 'Slett', danger: true, action: () => removeItem(token.id) },
      ].filter(Boolean);

      items.forEach(item => {
        if (item.sep) {
          const sep = document.createElement('div');
          sep.className = 'ctx-sep';
          menu.appendChild(sep);
          return;
        }
        const el = document.createElement('div');
        el.className = 'ctx-item' + (item.danger ? ' danger' : '');
        el.innerHTML = `<span>${item.icon}</span><span>${item.label}</span>`;
        el.onclick = () => { hideContextMenu(); item.action(); };
        menu.appendChild(el);
      });

      // Lim inn (bare hvis clipboard er fylt)
      if (clipboard) {
        const sep = document.createElement('div'); sep.className = 'ctx-sep'; menu.appendChild(sep);
        const el = document.createElement('div');
        el.className = 'ctx-item';
        el.innerHTML = `<span>📌</span><span>Lim inn kopi</span>`;
        el.onclick = () => { hideContextMenu(); pasteItem(); };
        menu.appendChild(el);
      }

      menu.classList.remove('hidden');
      const vw = window.innerWidth, vh = window.innerHeight;
      const mw = 160, mh = menu.offsetHeight || 160;
      menu.style.left = Math.min(clientX, vw - mw - 8) + 'px';
      menu.style.top  = Math.min(clientY, vh - mh - 8) + 'px';
    }

    function hideContextMenu() {
      document.getElementById('context-menu').classList.add('hidden');
    }

    function flashEl(tokenId) {
      const el = document.querySelector(`[data-token-id="${tokenId}"]`);
      if (!el) return;
      el.classList.add('confirm-flash');
      setTimeout(() => el.classList.remove('confirm-flash'), 450);
    }

    // ============================================================
    // DOBBELTKLIKK PÅ CANVAS = SKRIV INN FELT
    // ============================================================
    document.getElementById('step-display')?.addEventListener?.('dblclick', (e) => {
      if (e.target.id !== 'step-display' && e.target.id !== 'empty-hint') return;
      const display = document.getElementById('step-display');
      const rect = display.getBoundingClientRect();
      const cx = e.clientX - rect.left;

    function handleItemClick(tokenId, multiSelect = false) {
      if (state.activeColor !== null) {
        colorItem(tokenId, state.activeColor);
        return;
      }
      if (multiSelect) {
        // Cmd/Ctrl+klikk: toggle token i seleksjonen
        if (state.selectedTokenIds.has(tokenId)) state.selectedTokenIds.delete(tokenId);
        else state.selectedTokenIds.add(tokenId);
      } else {
        state.selectedTokenIds.clear();
        state.selectedTokenIds.add(tokenId);
      }
      if (state.selectedTokenIds.size > 0) {
        document.getElementById('math-input').blur();
        document.getElementById('step-display').focus();
      }
      render();
    }

    // ============================================================
    // STEG-PANEL
    // ============================================================
    function renderStepPanel() {
      const list = document.getElementById('step-list');
      list.innerHTML = '';
      state.steps.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'step-card' + (i === state.activeStepIndex ? ' active' : '');

        const num = document.createElement('span');
        num.className = 'step-num';
        num.textContent = i + 1;

        const preview = document.createElement('span');
        preview.className = 'step-preview';
        preview.textContent = s.tokens.length === 0 ? '(tom)' : s.tokens.map(t => {
          if (t.type === 'fraction') return (t.numerator?.[0]?.value || '?') + '/' + (t.denominator?.[0]?.value || '?');
          if (t.type === 'banknote') return t.value + 'kr';
          if (t.type === 'coin') return t.value + 'kr';
          return t.value;
        }).join(' ');

        const del = document.createElement('span');
        del.className = 'step-delete';
        del.textContent = '×';
        del.onclick = (e) => { e.stopPropagation(); deleteStep(i); };

        card.append(num, preview, del);
        card.onclick = () => setActiveStep(i);
        list.appendChild(card);
      });
    }

    // ============================================================
    // TEMA / FULLSKJERM
    // ============================================================
    function toggleTheme() {
      state.theme = state.theme === 'light' ? 'dark' : 'light';
      localStorage.setItem('mattebyggeren-theme', state.theme);
      render();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) document.getElementById('app').requestFullscreen().catch(() => {});
      else document.exitFullscreen();
    }

    // ============================================================
    // HURTIGTASTER
    // ============================================================
    document.addEventListener('keydown', (e) => {
      const input = document.getElementById('math-input');
      const inInput = document.activeElement === input;
      const inFracPop = !document.getElementById('frac-popover').classList.contains('hidden');
      const inModal = inFracPop; // bakoverkompatibel alias

      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
      if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c' && state.selectedTokenIds.size) { e.preventDefault(); copyItem(); return; }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'x' && state.selectedTokenIds.size) { e.preventDefault(); cutItem(); return; }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') { e.preventDefault(); pasteItem(); return; }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); addStep(); return; }
      if (e.key === 'Enter' && inInput && !inModal) { e.preventDefault(); addFromInput(); return; }
      if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); return; }

      if (inInput || inModal) return;

      if (e.key === 'ArrowRight') { e.preventDefault(); nextStep(); return; }
      if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); return; }

      if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedTokenIds.size) {
        e.preventDefault();
        saveUndo();
        const toDelete = [...state.selectedTokenIds];
        toDelete.forEach(id => { step().tokens = step().tokens.filter(t => t.id !== id); });
        state.selectedTokenIds.clear();
        render();
        return;
      }

      if (e.altKey && e.key >= '1' && e.key <= '8') {
        e.preventDefault();
        setColor(COLORS[parseInt(e.key) - 1]?.name ?? null);
        return;
      }

      if (e.key === 'Escape') {
        closeFracPopover();
        state.selectedTokenIds.clear();
        document.getElementById('emoji-panel').classList.add('hidden');
        if (drawMode) toggleDrawMode();
        if (lineMode) toggleLineMode();
        render();
      }

      if (e.key.toLowerCase() === 'd' && !inInput && !inModal) { e.preventDefault(); toggleDrawMode(); return; }
      if (e.key.toLowerCase() === 'l' && !inInput && !inModal) { e.preventDefault(); toggleLineMode(); return; }
      // b = hurtigtast for brøk (når ikke i inputfelt)
      if (e.key.toLowerCase() === 'b' && !inInput && !inModal) {
        e.preventDefault();
        const btn = document.getElementById('frac-toolbar-btn');
        if (btn) openFracPopoverFromBtn(btn);
        return;
      }
    });

    // ============================================================
    // ZOOM
    // ============================================================
    let zoomLevel = 1;
    const ZOOM_STEP = 0.15;
    const ZOOM_MIN = 0.3;
    const ZOOM_MAX = 3;

    function applyZoom() {
      const display = document.getElementById('step-display');
      display.querySelectorAll('.canvas-item').forEach(el => {
        const tokenId = el.dataset.tokenId;
        const token = step().tokens.find(t => t.id === tokenId);
        const scale = (token?.scale || 1) * zoomLevel;
        el.style.transform = `scale(${scale})`;
        el.style.transformOrigin = 'top left';
      });
      document.getElementById('zoom-label').textContent = Math.round(zoomLevel * 100) + '%';
    }

    function zoomIn() {
      zoomLevel = Math.min(ZOOM_MAX, zoomLevel + ZOOM_STEP);
      applyZoom();
    }

    function zoomOut() {
      zoomLevel = Math.max(ZOOM_MIN, zoomLevel - ZOOM_STEP);
      applyZoom();
    }

    function resetZoom() {
      zoomLevel = 1;
      applyZoom();
    }

    // Ctrl+scroll for zoom
    document.getElementById('step-display')?.addEventListener('wheel', (e) => {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        if (e.deltaY < 0) zoomIn(); else zoomOut();
      }
    }, { passive: false });

    // ============================================================
    // REGELBOK
    // ============================================================
    const REGELBOK = {
      'Potensregler': [
        { navn: 'Produktregel',       formel: 'a^m · a^n = a^{m+n}' },
        { navn: 'Divisjonsregel',     formel: 'a^m ÷ a^n = a^{m−n}' },
        { navn: 'Potens av potens',   formel: '(a^m)^n = a^{mn}' },
        { navn: 'Produktpotens',      formel: '(ab)^n = a^n · b^n' },
        { navn: 'Kvotientpotens',     formel: '(a÷b)^n = a^n ÷ b^n' },
        { navn: 'Nulleksponent',      formel: 'a^0 = 1' },
        { navn: 'Negativ eksponent',  formel: 'a^{−n} = 1 ÷ a^n' },
        { navn: 'Brøkeksponent',      formel: 'a^{1/n} = ⁿ√a' },
        { navn: 'Kvadratrot',         formel: '√a = a^{1/2}' },
        { navn: 'Generell roteksponent', formel: 'a^{m/n} = (ⁿ√a)^m' },
      ],
      'Logaritmer': [
        { navn: 'Produktregel',       formel: 'log(a·b) = log(a) + log(b)' },
        { navn: 'Divisjonsregel',     formel: 'log(a÷b) = log(a) − log(b)' },
        { navn: 'Potensregel',        formel: 'log(a^n) = n · log(a)' },
        { navn: 'log av grunntallet', formel: 'log_a(a) = 1' },
        { navn: 'log av 1',           formel: 'log_a(1) = 0' },
        { navn: 'Byttegrunntall',     formel: 'log_a(x) = ln(x) ÷ ln(a)' },
        { navn: 'e og ln',            formel: 'e^{ln(x)} = x' },
        { navn: 'ln av e',            formel: 'ln(e) = 1' },
        { navn: 'Naturlig logaritme', formel: 'ln(x) = log_e(x)' },
        { navn: 'Tierpotens',         formel: '10^{log(x)} = x' },
      ],
      'Derivasjon': [
        { navn: 'Potensregel',        formel: '(x^n)\' = n · x^{n−1}' },
        { navn: 'e^x',               formel: '(e^x)\' = e^x' },
        { navn: 'e^{f(x)}',          formel: '(e^{f(x)})\' = f\'(x)·e^{f(x)}' },
        { navn: 'a^x',               formel: '(a^x)\' = a^x · ln(a)' },
        { navn: 'ln x',              formel: '(ln x)\' = 1 ÷ x' },
        { navn: 'sin x',             formel: '(sin x)\' = cos x' },
        { navn: 'cos x',             formel: '(cos x)\' = −sin x' },
        { navn: 'tan x',             formel: '(tan x)\' = 1 ÷ cos^2(x)' },
        { navn: 'Summeregel',         formel: '(f + g)\' = f\' + g\'' },
        { navn: 'Differansregel',     formel: '(f − g)\' = f\' − g\'' },
        { navn: 'Produktregel',       formel: '(f·g)\' = f\'·g + f·g\'' },
        { navn: 'Kvotientregel',      formel: '(f÷g)\' = (f\'g − fg\') ÷ g^2' },
        { navn: 'Kjerneregel',        formel: '(f(g(x)))\' = f\'(g)·g\'' },
      ],
      'Geometri': [
        { navn: 'Areal sirkel',       formel: 'A = π · r^2' },
        { navn: 'Omkrets sirkel',     formel: 'O = 2 · π · r' },
        { navn: 'Areal trekant',      formel: 'A = (g · h) ÷ 2' },
        { navn: 'Pytagoras',          formel: 'a^2 + b^2 = c^2' },
        { navn: 'Areal rektangel',    formel: 'A = l · b' },
        { navn: 'Areal trapes',       formel: 'A = ((a+b) ÷ 2) · h' },
        { navn: 'Areal parallellogram', formel: 'A = g · h' },
        { navn: 'Volum sylinder',     formel: 'V = π · r^2 · h' },
        { navn: 'Volum kule',         formel: 'V = (4÷3) · π · r^3' },
        { navn: 'Volum kjegle',       formel: 'V = (1÷3) · π · r^2 · h' },
        { navn: 'Volum prisme',       formel: 'V = A_{bunn} · h' },
        { navn: 'Overflate kule',     formel: 'O = 4 · π · r^2' },
        { navn: 'Sinus-setningen',    formel: 'a÷sin(A) = b÷sin(B) = c÷sin(C)' },
        { navn: 'Cosinus-setningen',  formel: 'c^2 = a^2 + b^2 − 2ab·cos(C)' },
      ],
    };

    let regelbokActiveTab = Object.keys(REGELBOK)[0];

    function toggleRegelbok() {
      const panel = document.getElementById('regelbok-panel');
      if (panel.classList.contains('hidden')) {
        openRegelbok();
      } else {
        closeRegelbok();
      }
    }

    function openRegelbok() {
      document.getElementById('regelbok-panel').classList.remove('hidden');
      document.getElementById('regelbok-toggle').classList.add('active');
      renderRegelbok(regelbokActiveTab);
    }

    function closeRegelbok() {
      document.getElementById('regelbok-panel').classList.add('hidden');
      document.getElementById('regelbok-toggle').classList.remove('active');
    }

    function renderRegelbok(tab) {
      regelbokActiveTab = tab;

      // Tabs
      const tabsEl = document.getElementById('regelbok-tabs');
      tabsEl.innerHTML = '';
      Object.keys(REGELBOK).forEach(name => {
        const b = document.createElement('button');
        b.className = 'regelbok-tab' + (name === tab ? ' active' : '');
        b.textContent = name;
        b.onclick = () => renderRegelbok(name);
        tabsEl.appendChild(b);
      });

      // Regel-kort
      const grid = document.getElementById('regelbok-grid');
      grid.innerHTML = '';
      REGELBOK[tab].forEach(regel => {
        const card = document.createElement('div');
        card.className = 'regel-card';

        const navn = document.createElement('div');
        navn.className = 'regel-navn';
        navn.textContent = regel.navn;

        const formel = document.createElement('div');
        formel.className = 'regel-formel';
        formel.innerHTML = parseMathValue(regel.formel);

        const hint = document.createElement('div');
        hint.className = 'regel-hint';
        hint.textContent = '↙ Klikk for å sette inn';

        card.append(navn, formel, hint);
        card.onclick = () => insertRule(card, regel);
        grid.appendChild(card);
      });
    }

    function insertRule(cardEl, regel) {
      // Sett inn formelen som et tekst-token på canvas
      saveUndo();
      const canvas = document.getElementById('step-display');
      const rect = canvas.getBoundingClientRect();
      // Plasser sentralt på synlig del av canvas
      const x = Math.max(40, Math.min(state.nextPlaceX, rect.width * 0.6));
      const y = state.nextPlaceY;
      const token = makeToken('text', regel.formel, { x, y });
      step().tokens.push(token);
      state.selectedTokenIds = new Set([token.id]);
      render();

      // Visuell bekreftelse på kortet
      cardEl.classList.add('inserted');
      setTimeout(() => cardEl.classList.remove('inserted'), 800);
    }

    // ============================================================
    // VERKTØY
    // ============================================================
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // Konverterer x^2, x^{n+1}, x_i, x_{ij} til <sup>/<sub>-HTML.
    // Alle verdier escapes, slik at injeksjon er umulig.
    function parseMathValue(str) {
      const parts = [];
      let base = '';
      let i = 0;
      while (i < str.length) {
        const ch = str[i];
        if ((ch === '^' || ch === '_') && i + 1 < str.length) {
          if (base) { parts.push({ type: 'text', val: base }); base = ''; }
          const tag = ch === '^' ? 'sup' : 'sub';
          i++;
          if (str[i] === '{') {
            const end = str.indexOf('}', i);
            if (end !== -1) {
              parts.push({ type: tag, val: str.slice(i + 1, end) });
              i = end + 1;
            } else {
              // Ingen avsluttende } — behandle som vanlig tekst
              base += ch + str[i]; i++;
            }
          } else {
            parts.push({ type: tag, val: str[i] });
            i++;
          }
        } else {
          base += ch; i++;
        }
      }
      if (base) parts.push({ type: 'text', val: base });
      return parts.map(p =>
        p.type === 'text' ? esc(p.val) : `<${p.type}>${esc(p.val)}</${p.type}>`
      ).join('');
    }

    // ============================================================
    // INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', () => {
      // Brøk-popover listeners
      document.getElementById('frac-pop-num').addEventListener('input', updateFracPopPreview);
      document.getElementById('frac-pop-den').addEventListener('input', updateFracPopPreview);
      document.getElementById('frac-pop-num').addEventListener('keydown', (e) => {
        e.stopPropagation();
        if (e.key === 'Tab') { e.preventDefault(); document.getElementById('frac-pop-den').focus(); }
        if (e.key === 'Enter') insertFracFromPopover();
        if (e.key === 'Escape') closeFracPopover();
      });
      document.getElementById('frac-pop-den').addEventListener('keydown', (e) => {
        e.stopPropagation();
        if (e.key === 'Tab') { e.preventDefault(); document.getElementById('frac-pop-num').focus(); }
        if (e.key === 'Enter') insertFracFromPopover();
        if (e.key === 'Escape') closeFracPopover();
      });

      // Lukk popover ved klikk utenfor
      document.addEventListener('mousedown', (ev) => {
        const pop = document.getElementById('frac-popover');
        if (!pop.classList.contains('hidden') && !pop.contains(ev.target)) {
          const btn = document.getElementById('frac-toolbar-btn');
          if (!btn?.contains(ev.target)) closeFracPopover();
        }
      });

      render();
      focusInput();
    });
  </script>
